<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gauntlet Tracker MVP</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
        #map { height: calc(100vh - 64px); }
        .leaflet-draw-toolbar a { background-color: white !important; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans overflow-hidden">

    <header class="h-16 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-6 z-50 relative">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">🛡️</span>
            <h1 class="text-xl font-bold tracking-wide text-white">Gauntlet Tracker</h1>
        </div>
        <div class="text-sm text-gray-400 bg-gray-900 px-3 py-1.5 rounded-md border border-gray-700">
            🟢 Live Map (No Account Required)
        </div>
    </header>

    <div class="relative w-full h-[calc(100vh-64px)] flex">
        
        <div id="map" class="w-full h-full z-10"></div>

        <div id="sidebar" class="absolute top-4 right-4 z-50 w-full max-w-sm bg-gray-800/95 backdrop-blur-md p-6 rounded-xl shadow-2xl border border-gray-700 transform translate-x-[420px] transition-transform duration-300 max-h-[80vh] overflow-y-auto hidden">
            
            <button id="close-sidebar" class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl font-bold">&times;</button>

            <div id="form-container" class="hidden">
                <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                    <span>⚠️</span> Report New Gauntlet
                </h2>
                <form id="gauntlet-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Gauntlet Name</label>
                        <input type="text" id="g-name" required placeholder="e.g., Construction Zone, Heavy Traffic" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Severity Level (<span id="severity-val">3</span>/5)</label>
                        <input type="range" id="g-severity" min="1" max="5" value="3" class="w-full accent-amber-500 bg-gray-700 h-2 rounded-lg cursor-pointer">
                        <div class="flex justify-between text-xs text-gray-500 mt-1 px-1">
                            <span>Minor</span>
                            <span>Critical</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Description / Intel</label>
                        <textarea id="g-desc" rows="3" placeholder="Provide details about hazards, delays, or conditions..." class="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500"></textarea>
                    </div>

                    <div class="flex justify-center py-2">
                        <div id="turnstile-container"></div>
                    </div>

                    <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-gray-900 font-bold py-2.5 px-4 rounded-lg transition-colors cursor-pointer shadow-lg shadow-amber-500/20">
                        Submit Report
                    </button>
                </form>
            </div>

            <div id="details-container" class="hidden">
                <div class="flex items-center justify-between mb-3">
                    <span id="view-severity" class="px-2.5 py-1 text-xs font-bold rounded-full"></span>
                </div>
                <h2 id="view-name" class="text-xl font-bold text-white mb-2 break-words"></h2>
                <p id="view-desc" class="text-gray-300 text-sm bg-gray-900 p-3 rounded-lg border border-gray-700 whitespace-pre-wrap leading-relaxed mb-4"></p>
                <div class="text-xs text-gray-500 border-t border-gray-700 pt-3 flex justify-between">
                    <span>ID: <span id="view-id"></span></span>
                    <span id="view-date"></span>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION & CONFIG PLACEHOLDERS
        // ==========================================
        const API_URL = "YOUR_WORKER_URL"; 
        const TURNSTILE_SITE_KEY = "YOUR_SITE_KEY"; 

        // Severity Color Matrix
        const severityColors = {
            1: '#3b82f6', // Blue
            2: '#10b981', // Green
            3: '#f59e0b', // Amber
            4: '#f97316', // Orange
            5: '#ef4444'  // Red
        };

        // State variables
        let map, drawnItems, drawControl;
        let currentDraftLayer = null;
        let turnstileWidgetId = null;

        // Dom Elements
        const sidebar = document.getElementById('sidebar');
        const formContainer = document.getElementById('form-container');
        const detailsContainer = document.getElementById('details-container');
        const closeSidebarBtn = document.getElementById('close-sidebar');
        const gauntletForm = document.getElementById('gauntlet-form');
        const severityInput = document.getElementById('g-severity');
        const severityVal = document.getElementById('severity-val');

        // ==========================================
        // INITIALIZE MAP & PLUGINS
        // ==========================================
        function initMap() {
            // Default center at coordinates [0, 0] zoom level 2 if geolocation fails
            map = L.map('map', { zoomControl: false }).setView([37.7749, -122.4194], 12); 
            
            // Zoom controls layout adjustment
            L.control.zoom({ position: 'topleft' }).addTo(map);

            // Dark Matter Tile Layer matching dark UI scheme
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);

            // Layer for items created during session or pulled from API
            drawnItems = new L.FeatureGroup();
            map.addLayer(drawnItems);

            // Initialize draw controls
            drawControl = new L.Control.Draw({
                edit: false, // Keep MVP simple; no post-draw editing
                draw: {
                    polygon: {
                        allowIntersection: false,
                        shapeOptions: { color: '#f59e0b', weight: 3 }
                    },
                    circle: {
                        shapeOptions: { color: '#f59e0b', weight: 3 }
                    },
                    polyline: false,
                    rectangle: false,
                    marker: false,
                    circlemarker: false
                }
            });
            map.addControl(drawControl);

            // Geolocation auto-centering
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    map.setView([pos.coords.latitude, pos.coords.longitude], 13);
                }, () => console.log("Location access denied. Defaulting view."));
            }

            setupEventHandlers();
            fetchGauntlets();
        }

        // ==========================================
        // INTERACTIVE ENGINE / EVENT HANDLERS
        // ==========================================
        function setupEventHandlers() {
            // Catch shape drawing actions
            map.on(L.Draw.Event.CREATED, function (e) {
                clearDraft(); // Handle one pending submission at a time
                
                currentDraftLayer = e.layer;
                currentDraftLayer.setStyle({ color: severityColors[severityInput.value] });
                drawnItems.addLayer(currentDraftLayer);

                openFormMode();
            });

            // Dynamic live severity update behavior
            severityInput.addEventListener('input', (e) => {
                severityVal.textContent = e.target.value;
                if (currentDraftLayer) {
                    currentDraftLayer.setStyle({ color: severityColors[e.target.value] });
                }
            });

            // Close sidebar UI
            closeSidebarBtn.addEventListener('click', () => {
                closeSidebar();
                clearDraft();
            });

            // Submit handler
            gauntletForm.addEventListener('submit', handleFormSubmit);
        }

        // ==========================================
        // SIDEBAR STATE CONTROL
        // ==========================================
        function openFormMode() {
            detailsContainer.classList.add('hidden');
            formContainer.classList.remove('hidden');
            sidebar.classList.remove('hidden');
            sidebar.style.transform = 'translateX(0)';

            // Render Cloudflare Turnstile
            if (TURNSTILE_SITE_KEY !== "YOUR_SITE_KEY") {
                if (turnstileWidgetId !== null) turnstile.reset(turnstileWidgetId);
                else {
                    turnstileWidgetId = turnstile.render('#turnstile-container', {
                        sitekey: TURNSTILE_SITE_KEY,
                        theme: 'dark'
                    });
                }
            }
        }

        function openDetailsMode(properties) {
            formContainer.classList.add('hidden');
            detailsContainer.classList.remove('hidden');
            sidebar.classList.remove('hidden');
            sidebar.style.transform = 'translateX(0)';

            // Fill details dynamic layout
            document.getElementById('view-name').textContent = properties.name;
            document.getElementById('view-desc').textContent = properties.description || "No descriptions provided.";
            document.getElementById('view-id').textContent = properties.id.substring(0, 8);
            document.getElementById('view-date').textContent = new Date(properties.created_at).toLocaleDateString();
            
            const badge = document.getElementById('view-severity');
            badge.textContent = `Severity Level ${properties.severity}/5`;
            badge.style.backgroundColor = severityColors[properties.severity];
            badge.style.color = properties.severity >= 4 ? '#fff' : '#000';
        }

        function closeSidebar() {
            sidebar.style.transform = 'translateX(420px)';
            setTimeout(() => sidebar.classList.add('hidden'), 300);
        }

        function clearDraft() {
            if (currentDraftLayer && !currentDraftLayer.saved) {
                drawnItems.removeLayer(currentDraftLayer);
            }
            currentDraftLayer = null;
            gauntletForm.reset();
            severityVal.textContent = '3';
        }

        // ==========================================
        // GEOMETRY DATA FORMATTERS (GeoJSON / Circle)
        // ==========================================
        function parseLayerToGeometry(layer) {
            if (layer instanceof L.Circle) {
                return {
                    type: "Circle",
                    coordinates: [layer.getLatLng().lng, layer.getLatLng().lat],
                    radius: layer.getRadius()
                };
            } else {
                return layer.toGeoJSON().geometry;
            }
        }

        function renderGeometryToMap(gauntlet) {
            const geom = JSON.parse(gauntlet.geometry);
            let layer;

            if (geom.type === "Circle") {
                layer = L.circle([geom.coordinates[1], geom.coordinates[0]], {
                    radius: geom.radius,
                    color: severityColors[gauntlet.severity],
                    fillOpacity: 0.3,
                    weight: 2
                });
            } else {
                layer = L.geoJSON({ type: "Feature", geometry: geom }, {
                    style: {
                        color: severityColors[gauntlet.severity],
                        fillOpacity: 0.3,
                        weight: 2
                    }
                });
            }

            layer.saved = true;
            layer.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                openDetailsMode(gauntlet);
            });

            drawnItems.addLayer(layer);
        }

        // ==========================================
        // NETWORK API OPERATIONS
        // ==========================================
        async function fetchGauntlets() {
            if (API_URL === "YOUR_WORKER_URL") return; // Silent skip if unconfigured
            try {
                const res = await fetch(`${API_URL}/api/gauntlets`);
                const data = await res.json();
                data.forEach(gauntlet => renderGeometryToMap(gauntlet));
            } catch (err) {
                console.error("Failed to load map infrastructure metrics:", err);
            }
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            if (!currentDraftLayer) return;

            const payload = {
                id: crypto.randomUUID(),
                name: document.getElementById('g-name').value,
                description: document.getElementById('g-desc').value,
                severity: parseInt(severityInput.value),
                geometry: JSON.stringify(parseLayerToGeometry(currentDraftLayer))
            };

            // Inject Turnstile validation token token if present
            if (TURNSTILE_SITE_KEY !== "YOUR_SITE_KEY") {
                const token = turnstile.getResponse(turnstileWidgetId);
                if (!token) {
                    alert("Please complete the Cloudflare Turnstile challenge.");
                    return;
                }
                payload.cf_turnstile_token = token;
            }

            if (API_URL === "YOUR_WORKER_URL") {
                // Mock execution environment fallback
                alert("Prototype Mode! Configuration API URL is missing.\n\nSimulated Object Payload data logged into development window console.");
                console.log("Mock Outbound Payload Data:", payload);
                currentDraftLayer.saved = true;
                const mockResponseProperties = { ...payload, created_at: new Date().toISOString() };
                currentDraftLayer.on('click', () => openDetailsMode(mockResponseProperties));
                closeSidebar();
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/gauntlets`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("API transaction processing failure.");

                currentDraftLayer.saved = true;
                const freshSavedData = await response.json();
                
                // Re-bind click event to use real saved payload data instead of draft state
                currentDraftLayer.on('click', () => openDetailsMode(freshSavedData));
                
                closeSidebar();
            } catch (err) {
                alert("Error submitting gauntlet. Check console configuration errors.");
                console.error(err);
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
